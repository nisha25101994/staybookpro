
# ==============================================================
# =   DATASOURCE CONFIG (Connect to local MySQL DB)            =
# ==============================================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/assettrack_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:staybook_user}
spring.datasource.password=${DB_PASSWORD:staybook123}

# ==============================================================
# =   HIBERNATE / JPA CONFIG                                   =
# ==============================================================
# Automatically update schema based on entity changes (SAFE FOR DEV, DO NOT USE IN PROD)
spring.jpa.hibernate.ddl-auto=update
# Show SQL queries in console for debugging
spring.jpa.show-sql=true
# Use MySQL Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==============================================================
# =   SERVER CONFIG (Port setup)                               =
# ==============================================================
server.port=${PORT:8081}
# (Note: Port changed to 8081 to avoid conflict if StayBook is running on 8080)

# ==============================================================
# =   SECURITY/LOGGING                                         =
# ==============================================================
logging.level.org.springframework.security=DEBUG
